name: JetBrains plugin

on:
  push:
    branches: [main]
    paths: ['packages/jetbrains-plugin/**']
  pull_request:
    paths: ['packages/jetbrains-plugin/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Test and build plugin
        run: ./gradlew test buildPlugin --console=plain
        working-directory: packages/jetbrains-plugin
      - uses: actions/upload-artifact@v4
        with:
          name: typeghost-jetbrains
          path: packages/jetbrains-plugin/build/distributions/*.zip
